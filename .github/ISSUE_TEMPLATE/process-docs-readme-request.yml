name: "Add Content to Project Management Process Docs"
description: "Request to add new content or updates to an existing program management process document."
title: "[Process Doc Update]: README, project management processes summary, and links for OctoAcme Docs"
labels: ["documentation", "process improvement"]
body:
  - type: dropdown
    id: process_doc
    attributes:
      label: "Which process document do you want to update? (If this is a new document, select '')"
      description: "Select the program management process document you want to add content to. If this is a new process doc, choose ''."
      options:
        - 
    validations:
      required: true

  - type: textarea
    id: content_summary
    attributes:
      label: "Summary of New Content"
      description: "A README to serve as the central entry point for all OctoAcme project management documentation. It will include a summary of project management processes and organized links to all docs in the docs folder."
      placeholder: "E.g., Add clarification to risk escalation paths, new checklist for releases, additional role responsibilities, etc."
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "Why is this update needed?"
      description: "Currently the docs folder contains individual process docs that are not well-connected, making onboarding and process discovery difficult. A README will increase discoverability and provide a handy summary for new and existing team members."
      placeholder: "E.g., Identified gap in process, team feedback, alignment with industry standards, etc."
    validations:
      required: true

  - type: textarea
    id: example_content
    attributes:
      label: "Suggested Content (optional)"
      description: "See below for proposed README text:"
      placeholder: "## OctoAcme Project Management Docs\n\n### Overview\nOctoAcme uses a lifecycle-driven, role-oriented approach to project management. Key phases are initiation, planning, execution, release/deployment, and continuous improvement.\n\n### Process Docs\n- [Project Management Overview](docs/octoacme-project-management-overview.md)\n- [Project Initiation Guide](docs/octoacme-project-initiation.md)\n- [Project Planning Guide](docs/octoacme-project-planning.md)\n- [Execution & Tracking Guide](docs/octoacme-execution-and-tracking.md)\n- [Risk Management & Communication](docs/octoacme-risks-and-communication.md)\n- [Release & Deployment Guide](docs/octoacme-release-and-deployment.md)\n- [Retrospective & Continuous Improvement](docs/octoacme-retrospective-and-continuous-improvement.md)\n- [Roles and Personas](docs/octoacme-roles-and-personas.md)\n"

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "Check all that apply:"
      options:
        - label: "Content aligns with existing process docs"
        - label: "Update improves clarity or closes a documented gap"
        - label: "Proposed content has been reviewed with stakeholders (if needed)"
